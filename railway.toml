[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @naty/shared build && pnpm --filter @naty/api build"

[deploy]
startCommand = "node apps/api/dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/health"
timeout = 30
